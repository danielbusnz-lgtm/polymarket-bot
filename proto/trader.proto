syntax = "proto3";

package trader;

service Trader {
  rpc PlaceOrder (OrderRequest) returns (OrderResponse);
}

message OrderRequest {
  string market_id  = 1;
  string outcome    = 2;  // "YES" or "NO"
  double price      = 3;  // 0.0 to 1.0
  double size       = 4;  // USDC amount
  string strategy   = 5;  // "llm", "arbitrage", "whale"
  double tick_size  = 6;  // e.g. 0.01 — price will be snapped to this
  bool   neg_risk   = 7;  // true for multi-outcome markets (uses different exchange contract)
}

message OrderResponse {
  bool   success    = 1;
  string order_id   = 2;
  string message    = 3;
}
