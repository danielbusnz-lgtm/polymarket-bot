name: Recalibrate

on:
  workflow_dispatch:
  # Auto-refit weekly so the calibration adapts as more trades resolve.
  schedule:
    - cron: "0 12 * * 1"  # Mondays 12:00 UTC

concurrency:
  group: paper-trade  # share the lock with the main pipeline
  cancel-in-progress: false

jobs:
  recalibrate:
    name: Refit isotonic calibration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Recalibrate
        working-directory: python
        env:
          TURSO_SIGNALS_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_BOT_AUTH_TOKEN: ${{ secrets.TURSO_BOT_TOKEN }}
          TURSO_SIGNALS_DATABASE_URL: libsql://signum-danielbusnz-lgtm.aws-us-east-1.turso.io
          TURSO_BOT_DATABASE_URL: libsql://signum-bot-danielbusnz-lgtm.aws-us-east-1.turso.io
        run: uv run python paper_trade.py recalibrate

      - name: Show calibration report
        working-directory: python
        env:
          TURSO_SIGNALS_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_BOT_AUTH_TOKEN: ${{ secrets.TURSO_BOT_TOKEN }}
          TURSO_SIGNALS_DATABASE_URL: libsql://signum-danielbusnz-lgtm.aws-us-east-1.turso.io
          TURSO_BOT_DATABASE_URL: libsql://signum-bot-danielbusnz-lgtm.aws-us-east-1.turso.io
        run: uv run python paper_trade.py report
