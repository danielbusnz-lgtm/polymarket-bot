name: Paper Trade

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Prevent overlapping runs if a previous one is still going
concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  run:
    name: Run pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run paper trade pipeline
        working-directory: python
        env:
          # LLM providers (Anthropic required, others optional)
          ANTHROPIC_API_KEY: ${{ secrets.ANTRHOPIC }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.GROK_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # News context
          TAVILY_API_KEY: ${{ secrets.TAVILY }}
          # Turso — separate auth token per DB
          TURSO_SIGNALS_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_BOT_AUTH_TOKEN: ${{ secrets.TURSO_BOT_TOKEN }}
          TURSO_SIGNALS_DATABASE_URL: libsql://signum-danielbusnz-lgtm.aws-us-east-1.turso.io
          TURSO_BOT_DATABASE_URL: libsql://signum-bot-danielbusnz-lgtm.aws-us-east-1.turso.io
        run: uv run python paper_trade.py run
